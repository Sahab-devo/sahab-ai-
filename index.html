<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahab AI - Ultimate 3D Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            perspective: 1000px;
        }

        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            animation: backgroundPulse 8s ease-in-out infinite;
        }

        @keyframes backgroundPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 1s ease-out;
        }

        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #f0f8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            100% { text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 60px rgba(255, 255, 255, 0.3); }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 0.9; }
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-dot.error {
            background: #f44336;
        }

        .chat-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            transform: rotateX(5deg);
            transition: all 0.4s ease;
            animation: slideUp 1s ease-out 0.3s both;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(50px) rotateX(15deg); }
            100% { opacity: 1; transform: translateY(0) rotateX(5deg); }
        }

        .chat-container:hover {
            transform: rotateX(0deg) translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        .message {
            margin-bottom: 20px;
            opacity: 0;
            animation: messageSlide 0.5s ease-out forwards;
        }

        @keyframes messageSlide {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .user-message {
            text-align: right;
        }

        .user-message .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 20px 20px 5px 20px;
            display: inline-block;
            max-width: 80%;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            transform: scale(0.9);
            animation: bubbleGrow 0.3s ease-out 0.2s forwards;
            word-wrap: break-word;
        }

        @keyframes bubbleGrow {
            0% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .ai-message .message-bubble {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 20px;
            border-radius: 20px 20px 20px 5px;
            display: inline-block;
            max-width: 80%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transform: scale(0.9);
            animation: bubbleGrow 0.3s ease-out 0.2s forwards;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-container {
            position: relative;
            transform: perspective(500px) rotateX(10deg);
            animation: inputFloat 1s ease-out 0.6s both;
        }

        @keyframes inputFloat {
            0% { opacity: 0; transform: perspective(500px) rotateX(20deg) translateY(30px); }
            100% { opacity: 1; transform: perspective(500px) rotateX(10deg) translateY(0); }
        }

        .input-container:hover {
            transform: perspective(500px) rotateX(5deg) translateY(-2px);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #promptInput {
            flex: 1;
            padding: 18px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            outline: none;
        }

        #promptInput::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        #promptInput:focus {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        #promptInput:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .send-button {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .send-button:hover:not(:disabled) {
            transform: scale(1.1) rotateZ(15deg);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.5);
        }

        .send-button:active:not(:disabled) {
            transform: scale(0.95) rotateZ(15deg);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .typing-indicator {
            display: none;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin-bottom: 10px;
            backdrop-filter: blur(10px);
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-right: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            animation: typingPulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingPulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-cube {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: floatCube 8s ease-in-out infinite;
        }

        @keyframes floatCube {
            0%, 100% { transform: translateY(0) rotateX(0) rotateY(0); }
            25% { transform: translateY(-20px) rotateX(90deg) rotateY(90deg); }
            50% { transform: translateY(-40px) rotateX(180deg) rotateY(180deg); }
            75% { transform: translateY(-20px) rotateX(270deg) rotateY(270deg); }
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.4);
            color: #ffcdd2;
            padding: 10px 15px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 0.9rem;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .logo {
                font-size: 2.5rem;
            }
            
            .chat-container {
                padding: 20px;
                transform: none;
            }
            
            .input-container {
                transform: none;
            }
            
            .input-wrapper {
                flex-direction: column;
                gap: 10px;
            }
            
            #promptInput {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    <div class="particles"></div>
    <div class="floating-elements"></div>

    <div class="container">
        <div class="header">
            <div class="logo">✨ SAHAB AI</div>
            <div class="subtitle">Powered by Google Gemini AI</div>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connected to AI Backend</span>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message ai-message">
                    <div class="message-label">Sahab AI</div>
                    <div class="message-bubble">
                        🚀 Welcome to Sahab AI! I'm powered by Google Gemini and ready to help you with anything you need. Ask me questions, request creative content, or just have a conversation!
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <span class="typing-text">Sahab AI is thinking</span>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="promptInput" placeholder="Ask me anything..." />
                    <button class="send-button" id="sendButton">
                        <span id="sendIcon">➤</span>
                        <div class="loading-spinner" id="loadingSpinner" style="display: none;"></div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let isProcessing = false;
        
        // Initialize particles
        function createParticles() {
            const particlesContainer = document.querySelector('.particles');
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + 'vw';
                    particle.style.animationDelay = Math.random() * 6 + 's';
                    particle.style.animationDuration = (6 + Math.random() * 4) + 's';
                    particlesContainer.appendChild(particle);
                    
                    // Remove particle after animation
                    setTimeout(() => {
                        if (particle.parentNode) {
                            particle.remove();
                        }
                    }, 10000);
                }, i * 100);
            }
        }

        // Initialize floating cubes
        function createFloatingCubes() {
            const container = document.querySelector('.floating-elements');
            for (let i = 0; i < 8; i++) {
                const cube = document.createElement('div');
                cube.className = 'floating-cube';
                cube.style.left = Math.random() * 100 + 'vw';
                cube.style.top = Math.random() * 100 + 'vh';
                cube.style.animationDelay = Math.random() * 8 + 's';
                cube.style.animationDuration = (8 + Math.random() * 4) + 's';
                container.appendChild(cube);
            }
        }

        // Update status indicator
        function updateStatus(connected, message = '') {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (connected) {
                statusDot.className = 'status-dot';
                statusText.textContent = message || 'Connected to AI Backend';
            } else {
                statusDot.className = 'status-dot error';
                statusText.textContent = message || 'Connection Error';
            }
        }

        // Add message to chat
        function addMessage(content, isUser = false, isError = false) {
            const chatMessages = document.getElementById('chatMessages');
            const message = document.createElement('div');
            message.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            
            if (isError) {
                message.innerHTML = `<div class="error-message">${content}</div>`;
            } else {
                message.innerHTML = `
                    <div class="message-label">${isUser ? 'You' : 'Sahab AI'}</div>
                    <div class="message-bubble">${content}</div>
                `;
            }
            
            chatMessages.appendChild(message);
            
            // Animate message appearance
            setTimeout(() => {
                message.style.animation = 'messageSlide 0.5s ease-out forwards';
            }, 50);
            
            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Simulate typing animation for AI responses
        function typeMessage(content) {
            return new Promise((resolve) => {
                const chatMessages = document.getElementById('chatMessages');
                const message = document.createElement('div');
                message.className = 'message ai-message';
                message.innerHTML = `
                    <div class="message-label">Sahab AI</div>
                    <div class="message-bubble"><span class="typing-text"></span></div>
                `;
                
                chatMessages.appendChild(message);
                const typingText = message.querySelector('.typing-text');
                
                let i = 0;
                const typeInterval = setInterval(() => {
                    if (i < content.length) {
                        typingText.textContent += content.charAt(i);
                        i++;
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                    } else {
                        clearInterval(typeInterval);
                        resolve();
                    }
                }, 20); // Faster typing for better UX
            });
        }

        // Call the backend API
        async function callGeminiAPI(message) {
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.status === 'error') {
                    throw new Error(data.error || 'Unknown error occurred');
                }
                
                return data.response;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // Handle sending messages
        async function sendMessage() {
            if (isProcessing) return;
            
            const input = document.getElementById('promptInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Set processing state
            isProcessing = true;
            updateUI(true);
            
            // Add user message
            addMessage(message, true);
            input.value = '';
            
            // Show typing indicator
            const typingIndicator = document.getElementById('typingIndicator');
            typingIndicator.style.display = 'block';
            
            try {
                // Call the actual API
                const aiResponse = await callGeminiAPI(message);
                
                // Hide typing indicator
                typingIndicator.style.display = 'none';
                
                // Type the AI response
                await typeMessage(aiResponse);
                
                updateStatus(true, 'AI Response Received');
                
            } catch (error) {
                // Hide typing indicator
                typingIndicator.style.display = 'none';
                
                // Show error message
                addMessage(`❌ Error: ${error.message}`, false, true);
                updateStatus(false, 'Connection Failed');
                
                console.error('Send message error:', error);
            } finally {
                // Reset processing state
                isProcessing = false;
                updateUI(false);
            }
        }

        // Update UI elements during processing
        function updateUI(processing) {
            const input = document.getElementById('promptInput');
            const sendButton = document.getElementById('sendButton');
            const sendIcon = document.getElementById('sendIcon');
            const loadingSpinner = document.getElementById('loadingSpinner');
            
            if (processing) {
                input.disabled = true;
                sendButton.disabled = true;
                sendIcon.style.display = 'none';
                loadingSpinner.style.display = 'block';
            } else {
                input.disabled = false;
                sendButton.disabled = false;
                sendIcon.style.display = 'block';
                loadingSpinner.style.display = 'none';
                input.focus();
            }
        }

        // Test backend connection
        async function testConnection() {
            try {
                const response = await fetch('/health');
                if (response.ok) {
                    updateStatus(true, 'Backend Connected');
                } else {
                    throw new Error('Health check failed');
                }
            } catch (error) {
                updateStatus(false, 'Backend Offline');
                console.error('Connection test failed:', error);
            }
        }

        // Event listeners
        document.getElementById('sendButton').addEventListener('click', sendMessage);
        document.getElementById('promptInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isProcessing) {
                sendMessage();
            }
        });

        // Initialize effects and test connection
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            createFloatingCubes();
            testConnection();
            
            // Continuously create new particles
            setInterval(createParticles, 10000);
            
            // Focus input
            document.getElementById('promptInput').focus();
            
            // Test connection periodically
            setInterval(testConnection, 30000);
        });

        // Add hover effects to messages
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('.message-bubble')) {
                e.target.closest('.message-bubble').style.transform = 'scale(1.02)';
            }
        });

        document.addEventListener('mouseout', (e) => {
            if (e.target.closest('.message-bubble')) {
                e.target.closest('.message-bubble').style.transform = 'scale(1)';
            }
        });

        // Add click ripple effect
        document.addEventListener('click', (e) => {
            if (e.target.closest('.send-button') && !isProcessing) {
                const button = e.target.closest('.send-button');
                const ripple = document.createElement('div');
                ripple.style.cssText = `
                    position: absolute;
                    border-radius: 50%;
                    background: rgba(255,255,255,0.5);
                    transform: scale(0);
                    animation: ripple 0.6s ease-out;
                    pointer-events: none;
                    left: 50%;
                    top: 50%;
                    width: 100px;
                    height: 100px;
                    margin-left: -50px;
                    margin-top: -50px;
                `;
                
                const style = document.createElement('style');
                style.textContent = `
                    @keyframes ripple {
                        to { transform: scale(2); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
                
                button.appendChild(ripple);
                
                setTimeout(() => {
                    if (ripple.parentNode) {
                        ripple.remove();
                    }
                    if (style.parentNode) {
                        style.remove();
                    }
                }, 600);
            }
        });
    </script>
</body>
</html>
